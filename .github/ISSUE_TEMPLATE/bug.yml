name: Bug report
description: Report reproducible incorrect RTL or tooling behavior
title: "[Bug]: "
labels:
  - "bug"
  - "status: triage"
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commit, configuration, command, seed, and minimal test.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or waveform evidence
      description: Remove secrets and attach only relevant output.
